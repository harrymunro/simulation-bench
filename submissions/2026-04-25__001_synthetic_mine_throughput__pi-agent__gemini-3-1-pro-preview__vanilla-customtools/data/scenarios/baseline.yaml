scenario_id: baseline
description: Baseline 8-hour ore haulage shift

simulation:
  shift_length_hours: 8
  replications: 30
  base_random_seed: 12345
  warmup_minutes: 0

routing:
  objective: shortest_time
  allow_bypass: true
  road_capacity_enabled: true

production:
  objective: maximise_ore_to_crusher
  ore_sources:
    - LOAD_N
    - LOAD_S
  dump_destination: CRUSH

dispatching:
  policy: nearest_available_loader
  tie_breaker: shortest_expected_cycle_time

stochasticity:
  loading_time_distribution: normal_truncated
  dumping_time_distribution: normal_truncated
  travel_time_noise_cv: 0.10

fleet:
  truck_count: 8

